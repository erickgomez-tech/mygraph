<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SAP B1 Knowledge Graph — Agente</title>
<style>
  :root { color-scheme: light dark; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    max-width: 720px;
    margin: 2rem auto;
    padding: 0 1rem;
  }
  h1 { font-size: 1.2rem; }
  #log {
    border: 1px solid #8884;
    border-radius: 8px;
    padding: 1rem;
    height: 60vh;
    overflow-y: auto;
    margin-bottom: 1rem;
  }
  .msg { margin-bottom: 1rem; white-space: pre-wrap; }
  .msg .who { font-weight: 600; display: block; margin-bottom: 0.25rem; }
  .msg.user .who { color: #2563eb; }
  .msg.agent .who { color: #16a34a; }
  .msg.error .who { color: #dc2626; }
  form { display: flex; gap: 0.5rem; }
  input[type="text"] {
    flex: 1;
    padding: 0.6rem;
    border-radius: 6px;
    border: 1px solid #8888;
    font-size: 1rem;
  }
  button {
    padding: 0.6rem 1.2rem;
    border-radius: 6px;
    border: none;
    background: #2563eb;
    color: white;
    font-size: 1rem;
    cursor: pointer;
  }
  button:disabled { opacity: 0.5; cursor: default; }
</style>
</head>
<body>
  <h1>Agente del Knowledge Graph 360° (BusinessPartners y entidades relacionadas)</h1>
  <div id="log"></div>
  <form id="form">
    <input id="question" type="text" placeholder="ej. ¿Qué facturas tiene el cliente C20000?" autocomplete="off" />
    <button type="submit" id="submit">Preguntar</button>
  </form>

  <script>
    const log = document.getElementById("log");
    const form = document.getElementById("form");
    const input = document.getElementById("question");
    const submitBtn = document.getElementById("submit");

    function addMessage(who, text, cls) {
      const div = document.createElement("div");
      div.className = "msg " + cls;
      const label = document.createElement("span");
      label.className = "who";
      label.textContent = who;
      div.appendChild(label);
      div.appendChild(document.createTextNode(text));
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const question = input.value.trim();
      if (!question) return;

      addMessage("Tú", question, "user");
      input.value = "";
      submitBtn.disabled = true;

      try {
        const res = await fetch("/agent/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question }),
        });
        const data = await res.json();
        if (!res.ok) {
          addMessage("Error", data.error || ("HTTP " + res.status), "error");
        } else {
          addMessage("Agente", data.answer || "(sin respuesta)", "agent");
        }
      } catch (err) {
        addMessage("Error", String(err), "error");
      } finally {
        submitBtn.disabled = false;
        input.focus();
      }
    });
  </script>
</body>
</html>
